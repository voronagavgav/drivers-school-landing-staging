<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="system-ui, sans-serif">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dbeafe"/><stop offset="1" stop-color="#eff6ff"/>
    </linearGradient>
  </defs>
  <rect width="800" height="460" fill="url(#sky)"/>
  <!-- ground / hill -->
  <path d="M0,300 L300,300 Q400,150 500,300 L800,300 L800,460 L0,460 Z" fill="#86b06b"/>
  <!-- road surface following the crest -->
  <path d="M0,300 L300,300 Q400,150 500,300 L800,300 L800,360 L500,360 Q400,210 300,360 L0,360 Z" fill="#4b5563"/>
  <!-- centre line (dashed), following the crest -->
  <path d="M0,330 L300,330 Q400,180 500,330 L800,330" fill="none" stroke="#fde047" stroke-width="3" stroke-dasharray="18 14"/>
  <!-- grade direction markers (clear of the cars, on the flat road ends) -->
  <text x="20" y="346" font-size="16" fill="#e5e7eb" font-weight="700">підйом ⬈</text>
  <text x="694" y="346" font-size="16" fill="#e5e7eb" font-weight="700">⬊ спуск</text>

  <!-- YOUR car (blue), ascending left slope -->
  <g transform="translate(150,316) rotate(-21)">
    <rect x="-34" y="-20" width="68" height="22" rx="6" fill="#2563eb"/>
    <rect x="-20" y="-32" width="38" height="16" rx="5" fill="#3b82f6"/>
    <circle cx="-20" cy="6" r="8" fill="#111827"/><circle cx="20" cy="6" r="8" fill="#111827"/>
  </g>
  <text x="150" y="385" font-size="15" text-anchor="middle" fill="#1d4ed8" font-weight="700">Ви</text>

  <!-- OBSTACLE on your lane ahead (amber barrier) -->
  <g transform="translate(265,300) rotate(-12)">
    <rect x="-16" y="-26" width="32" height="26" rx="3" fill="#f59e0b" stroke="#b45309" stroke-width="2"/>
    <path d="M-16,-26 l32,26 M16,-26 l-32,26" stroke="#b45309" stroke-width="2"/>
  </g>
  <text x="252" y="262" font-size="13" text-anchor="middle" fill="#b45309" font-weight="700">перешкода</text>

  <!-- ONCOMING car (red), descending right slope -->
  <g transform="translate(600,316) rotate(21) scale(-1,1)">
    <rect x="-34" y="-20" width="68" height="22" rx="6" fill="#dc2626"/>
    <rect x="-20" y="-32" width="38" height="16" rx="5" fill="#ef4444"/>
    <circle cx="-20" cy="6" r="8" fill="#111827"/><circle cx="20" cy="6" r="8" fill="#111827"/>
  </g>
  <text x="600" y="385" font-size="15" text-anchor="middle" fill="#b91c1c" font-weight="700">зустрічний (на спуск)</text>

  <text x="400" y="40" font-size="20" text-anchor="middle" fill="#111827" font-weight="800">Крутий підйом — зустрічний роз'їзд</text>
</svg>
